<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>이슬로 베이비 미니게임 · 공유</title>
  <meta name="theme-color" content="#7fbce6" />

  <!-- 폰트: Jua (무료 Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />

  <!-- 스타일 (색/폰트 값은 theme.css 에서 수정) -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/share.css" />
</head>
<body>
  <main class="share-card">
    <div class="share-logo">eslo<small>이슬로 베이비</small></div>

    <h1 class="share-title">이슬로 베이비 미니게임</h1>
    <p class="share-desc">QR을 스캔하면 게임을 바로 실행할 수 있어요.</p>

    <!-- QR 코드 영역 (js/share.js 가 실제 QR을 생성해 삽입) -->
    <div class="qr-area" id="qr-area" aria-label="게임 접속 QR 코드"></div>

    <!-- 배포 URL 표시 -->
    <div class="url-box" id="game-url">https://manzzi3215-droid.github.io/eslobaby-game2/</div>

    <!-- 게임 바로가기 버튼 (js/share.js 가 href 설정) -->
    <a class="go-btn" id="go-game" href="https://manzzi3215-droid.github.io/eslobaby-game2/">게임 바로가기</a>

    <p class="share-foot">회사 내부 공유 · 베이비페어 현장 테스트 · 모바일 접속용</p>
  </main>

  <!-- QR 생성기 → 페이지 로직 순서 유지 -->
  <script src="js/qrcode.js"></script>
  <script src="js/share.js"></script>
</body>
</html>
